{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="panel narrow auth-card">
  <h1>Welcome back</h1>
  <p class="lead">Log in to manage your bookings.</p>

  <form method="post" action="{% url 'auth_login' %}">
    {% csrf_token %}
    <div class="form-row">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ form.email|default:'' }}" required autofocus>
    </div>
    <div class="form-row">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
    </div>
    <button class="btn btn-solid btn-block" type="submit">Log in</button>
  </form>

  <p class="form-aside">
    New here? <a href="{% url 'auth_register' %}">Create an account</a>
  </p>
</div>
{% endblock %}
